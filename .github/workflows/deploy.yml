# Déploiement automatique vers l'hébergement mutualisé OVHcloud.
# À chaque push sur main, le site est envoyé par FTP dans le dossier www/.
# (FTP simple : le cluster OVH mutualisé refuse l'AUTH TLS — « 500 This
# security scheme is not implemented ». Passer en SFTP si l'offre inclut SSH.)
# Prérequis : 3 secrets à créer dans GitHub (Settings → Secrets and variables → Actions) :
#   OVH_FTP_SERVER    → ex. ftp.cluster0XX.hosting.ovh.net
#   OVH_FTP_USERNAME  → identifiant FTP OVH
#   OVH_FTP_PASSWORD  → mot de passe FTP OVH

name: Déploiement OVH

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Envoyer les fichiers vers OVH (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.OVH_FTP_SERVER }}
          username: ${{ secrets.OVH_FTP_USERNAME }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          protocol: ftp
          server-dir: www/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            .gitignore
