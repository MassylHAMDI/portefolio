    <rect x="576" y="120" width="88" height="24" rx="12" fill="#7dc9a1" fill-opacity=".1" stroke="#7dc9a1" stroke-opacity=".6"/>
    <text x="620" y="136" font-size="11" letter-spacing="1" fill="#a9dfc3" text-anchor="middle">OK · 0,99</text>
  </g>

  <!-- pied de page -->
  <text x="56" y="462" font-size="10.5" letter-spacing="2" fill="#ece7dd" opacity=".45">DÉFAUT PAROI DÉTECTÉ — ÉJECTION AUTOMATIQUE</text>
</svg>
