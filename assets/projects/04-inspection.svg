    <rect x="136" y="120" width="88" height="24" rx="12" fill="#7dc9a1" fill-opacity=".1" stroke="#7dc9a1" stroke-opacity=".6"/>
    <text x="180" y="136" font-size="11" letter-spacing="1" fill="#a9dfc3" text-anchor="middle">OK · 0,99</text>
  </g>

  <!-- bouteille défectueuse (centre) -->
  <g>
    <rect x="391" y="168" width="18" height="12" rx="3" fill="#9aa3b8" opacity=".9"/>
    <path d="M391 180 v10 C391 202 374 206 374 232 L374 258 L385 270 L374 282 V314 Q374 330 388 330 H412 Q426 330 426 314 V232 C426 206 409 202 409 190 V180 Z"
          fill="#dfe9f2" fill-opacity=".08" stroke="#d9dfe8" stroke-width="2.5"/>
    <line x1="380" y1="250" x2="420" y2="250" stroke="#d9dfe8" stroke-opacity=".25" stroke-width="2"/>
    <line x1="380" y1="262" x2="420" y2="262" stroke="#d9dfe8" stroke-opacity=".25" stroke-width="2"/>
    <circle cx="380" cy="270" r="10" fill="#e06c5f" opacity=".22"/>
    <circle cx="380" cy="270" r="4.5" fill="#e06c5f"/>
    <rect x="354" y="152" width="92" height="196" fill="none" stroke="#e06c5f" stroke-width="3" stroke-dasharray="9 6"/>
    <rect x="336" y="112" width="128" height="26" rx="13" fill="#e06c5f" fill-opacity=".14" stroke="#e06c5f"/>
    <text x="400" y="129" font-size="11.5" letter-spacing="1" fill="#f2a79c" text-anchor="middle">ANOMALIE · 0,97</text>
  </g>

  <!-- bouteille OK (droite) -->
  <g>
    <rect x="611" y="168" width="18" height="12" rx="3" fill="#9aa3b8" opacity=".9"/>
    <path d="M611 180 v10 C611 202 594 206 594 232 V314 Q594 330 608 330 H632 Q646 330 646 314 V232 C646 206 629 202 629 190 V180 Z"
