    <line x1="600" y1="250" x2="640" y2="250" stroke="#d9dfe8" stroke-opacity=".25" stroke-width="2"/>
    <line x1="600" y1="262" x2="640" y2="262" stroke="#d9dfe8" stroke-opacity=".25" stroke-width="2"/>
    <path d="M604 236 V306" stroke="#fff" stroke-opacity=".18" stroke-width="4" stroke-linecap="round"/>
    <g stroke="#7dc9a1" stroke-width="2.5" stroke-opacity=".75" fill="none">
      <path d="M580 172 v-14 h14"/>
      <path d="M646 158 h14 v14"/>
      <path d="M660 330 v14 h-14"/>
      <path d="M594 344 h-14 v-14"/>
