<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="ga" cx="82%" cy="82%" r="85%">
      <stop offset="0" stop-color="#6b4f3a" stop-opacity=".55"/>
      <stop offset="1" stop-color="#6b4f3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb" cx="14%" cy="22%" r="80%">
      <stop offset="0" stop-color="#1c1d33" stop-opacity=".9"/>
      <stop offset="1" stop-color="#1c1d33" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="#0a0b15"/>
  <rect width="800" height="500" fill="url(#gb)"/>
  <rect width="800" height="500" fill="url(#ga)"/>

  <!-- en-tête -->
  <text x="44" y="60" font-size="21" font-weight="700" fill="#ece7dd">CamemBERT-QA</text>
  <g>
    <rect x="596" y="34" width="164" height="30" rx="15" fill="#e8b84b" fill-opacity=".1" stroke="#e8b84b" stroke-opacity=".45"/>
    <text x="678" y="53" font-size="11.5" letter-spacing="1.5" fill="#f0d391" text-anchor="middle">FINE-TUNING</text>
  </g>

  <!-- contexte avec réponse surlignée -->
  <g>
    <rect x="44" y="96" width="460" height="212" rx="16" fill="#ece7dd" fill-opacity=".05" stroke="#ece7dd" stroke-opacity=".12"/>
    <text x="64" y="128" font-size="11.5" letter-spacing="3" fill="#e8b84b" opacity=".95">CONTEXTE</text>
    <g fill="#ece7dd" opacity=".35">
      <rect x="64" y="146" width="404" height="9" rx="4.5"/>
      <rect x="64" y="168" width="380" height="9" rx="4.5"/>
      <rect x="64" y="190" width="150" height="9" rx="4.5"/>
    </g>
    <rect x="222" y="184" width="188" height="21" rx="10.5" fill="#e8b84b" fill-opacity=".22" stroke="#e8b84b" stroke-opacity=".6"/>
    <g fill="#ece7dd" opacity=".35">
      <rect x="418" y="190" width="50" height="9" rx="4.5"/>
      <rect x="64" y="212" width="404" height="9" rx="4.5"/>
      <rect x="64" y="234" width="356" height="9" rx="4.5"/>
      <rect x="64" y="256" width="404" height="9" rx="4.5"/>
      <rect x="64" y="278" width="220" height="9" rx="4.5"/>
    </g>
    <text x="316" y="199" font-size="11" letter-spacing="1" fill="#f0d391" text-anchor="middle">RÉPONSE EXTRAITE</text>
  </g>

  <!-- question / réponse -->
  <g>
    <rect x="84" y="332" width="380" height="46" rx="20" fill="#ece7dd" fill-opacity=".07" stroke="#ece7dd" stroke-opacity=".16"/>
    <text x="106" y="360" font-size="13.5" fill="#ece7dd" opacity=".85">« Quelle est la capitale de la France ? »</text>
    <rect x="228" y="392" width="236" height="46" rx="20" fill="#e8b84b" fill-opacity=".13" stroke="#e8b84b" stroke-opacity=".5"/>
    <text x="250" y="420" font-size="13.5" font-weight="600" fill="#f0d391">Paris · score 0,97</text>
  </g>

  <!-- panneau modèle -->
  <g>
    <rect x="544" y="96" width="216" height="342" rx="14" fill="#ece7dd" fill-opacity=".045" stroke="#ece7dd" stroke-opacity=".12"/>
    <text x="564" y="130" font-size="11.5" letter-spacing="3" fill="#e8b84b" opacity=".95">TRANSFORMER</text>
    <!-- couches empilées -->
    <g stroke="#ece7dd" stroke-opacity=".25">
      <rect x="576" y="150" width="152" height="26" rx="7" fill="#e8b84b" fill-opacity=".16"/>
      <rect x="576" y="184" width="152" height="26" rx="7" fill="#e8b84b" fill-opacity=".12"/>
      <rect x="576" y="218" width="152" height="26" rx="7" fill="#e8b84b" fill-opacity=".09"/>
      <rect x="576" y="252" width="152" height="26" rx="7" fill="#ece7dd" fill-opacity=".05"/>
    </g>
    <text x="652" y="168" font-size="10.5" fill="#ece7dd" opacity=".7" text-anchor="middle">tête QA (start / end)</text>
    <text x="652" y="202" font-size="10.5" fill="#ece7dd" opacity=".7" text-anchor="middle">encodeur ×12</text>
    <text x="652" y="236" font-size="10.5" fill="#ece7dd" opacity=".7" text-anchor="middle">embeddings</text>
    <text x="652" y="270" font-size="10.5" fill="#ece7dd" opacity=".7" text-anchor="middle">tokenizer SentencePiece</text>
    <line x1="652" y1="286" x2="652" y2="304" stroke="#ece7dd" stroke-opacity=".3"/>
    <!-- attention sur tokens -->
    <text x="564" y="330" font-size="11.5" letter-spacing="3" fill="#e8b84b" opacity=".95">ATTENTION</text>
    <g fill="#e8b84b">
      <rect x="576" y="346" width="14" height="44" rx="4" opacity=".25"/>
      <rect x="598" y="360" width="14" height="30" rx="4" opacity=".45"/>
      <rect x="620" y="342" width="14" height="48" rx="4" opacity=".9"/>
      <rect x="642" y="368" width="14" height="22" rx="4" opacity=".35"/>
      <rect x="664" y="352" width="14" height="38" rx="4" opacity=".65"/>
      <rect x="686" y="372" width="14" height="18" rx="4" opacity=".25"/>
      <rect x="708" y="364" width="14" height="26" rx="4" opacity=".4"/>
    </g>
    <text x="564" y="420" font-size="11" fill="#ece7dd" opacity=".5">Question-réponse en français</text>
  </g>
</svg>
