<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="ga" cx="72%" cy="28%" r="85%">
      <stop offset="0" stop-color="#5a4368" stop-opacity=".55"/>
      <stop offset="1" stop-color="#5a4368" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb" cx="14%" cy="88%" r="80%">
      <stop offset="0" stop-color="#1c1d33" stop-opacity=".9"/>
      <stop offset="1" stop-color="#1c1d33" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="#0a0b15"/>
  <rect width="800" height="500" fill="url(#gb)"/>
  <rect width="800" height="500" fill="url(#ga)"/>

  <!-- fenêtre OpenCV : vidéo -->
  <rect x="24" y="22" width="486" height="330" rx="14" fill="#0e1020" stroke="#ece7dd" stroke-opacity=".13" stroke-width="1.5"/>
  <text x="44" y="50" font-size="11" letter-spacing="2" fill="#ece7dd" opacity=".6">SETTINGS — image 0247/1800</text>
  <line x1="24" y1="62" x2="510" y2="62" stroke="#ece7dd" stroke-opacity=".1"/>

  <!-- axe recalé -->
  <line x1="267" y1="78" x2="267" y2="336" stroke="#c9a0dc" stroke-opacity=".35" stroke-dasharray="4 7"/>
  <line x1="60" y1="207" x2="474" y2="207" stroke="#c9a0dc" stroke-opacity=".35" stroke-dasharray="4 7"/>
  <circle cx="267" cy="207" r="5" fill="#c9a0dc"/>
  <!-- arc d'angle -->
  <path d="M 337 207 A 70 70 0 0 0 320 163" fill="none" stroke="#e8b84b" stroke-width="2.5"/>
  <text x="386" y="192" font-size="12" fill="#e8b84b">θ = 32,4°</text>

  <!-- objet suivi + boîte -->
  <circle cx="345" cy="150" r="17" fill="#c9a0dc" fill-opacity=".8"/>
  <rect x="316" y="121" width="58" height="58" fill="none" stroke="#7dc9a1" stroke-width="2.5"/>
  <text x="316" y="112" font-size="10.5" letter-spacing="1" fill="#a9dfc3">CIBLE (x: 345, y: 150)</text>
  <!-- trajectoire -->
  <path d="M120 300 Q190 268 240 236 T345 150" fill="none" stroke="#7dc9a1" stroke-width="2" stroke-dasharray="1 8" stroke-linecap="round"/>

  <!-- barre de réglage (trackbar) -->
  <rect x="44" y="368" width="466" height="64" rx="14" fill="#ece7dd" fill-opacity=".045" stroke="#ece7dd" stroke-opacity=".12"/>
  <text x="64" y="394" font-size="10.5" letter-spacing="2" fill="#c9a0dc">RADIUS · 255</text>
  <rect x="64" y="406" width="426" height="8" rx="4" fill="#ece7dd" fill-opacity=".08"/>
  <rect x="64" y="406" width="106" height="8" rx="4" fill="#c9a0dc"/>
  <circle cx="170" cy="410" r="8" fill="#ece7dd"/>

  <!-- panneau masque + export -->
  <g>
    <rect x="534" y="22" width="242" height="216" rx="14" fill="#ece7dd" fill-opacity=".045" stroke="#ece7dd" stroke-opacity=".12"/>
    <text x="554" y="54" font-size="11.5" letter-spacing="3" fill="#c9a0dc" opacity=".95">MASQUE</text>
    <rect x="554" y="70" width="202" height="140" rx="10" fill="#000" fill-opacity=".45" stroke="#ece7dd" stroke-opacity=".14"/>
    <circle cx="672" cy="122" r="15" fill="#ece7dd"/>
    <circle cx="605" cy="168" r="6" fill="#ece7dd" opacity=".5"/>
    <circle cx="720" cy="180" r="4" fill="#ece7dd" opacity=".35"/>
    <text x="655" y="200" font-size="10" fill="#ece7dd" opacity=".55" text-anchor="middle">soustraction de fond</text>
  </g>
  <g>
    <rect x="534" y="262" width="242" height="170" rx="14" fill="#ece7dd" fill-opacity=".045" stroke="#ece7dd" stroke-opacity=".12"/>
    <text x="554" y="294" font-size="11.5" letter-spacing="3" fill="#7dc9a1" opacity=".95">MESURES</text>
    <g font-size="12" fill="#ece7dd" opacity=".75">
      <text x="554" y="324">t (s)</text><text x="640" y="324">x, y (px)</text><text x="730" y="324">θ (°)</text>
      <text x="554" y="350" opacity=".9">8,23</text><text x="640" y="350" opacity=".9">345, 150</text><text x="730" y="350" opacity=".9">32,4</text>
      <text x="554" y="374" opacity=".6">8,27</text><text x="640" y="374" opacity=".6">349, 144</text><text x="730" y="374" opacity=".6">33,1</text>
    </g>
    <rect x="554" y="392" width="150" height="26" rx="13" fill="#7dc9a1" fill-opacity=".1" stroke="#7dc9a1" stroke-opacity=".45"/>
    <text x="629" y="409" font-size="11" letter-spacing="1" fill="#a9dfc3" text-anchor="middle">Export .xlsx ✓</text>
  </g>

  <!-- pastille techno -->
  <rect x="24" y="452" width="180" height="26" rx="13" fill="#c9a0dc" fill-opacity=".1" stroke="#c9a0dc" stroke-opacity=".45"/>
  <text x="114" y="469" font-size="11" letter-spacing="1" fill="#dcc2ea" text-anchor="middle">Python · OpenCV</text>
</svg>
