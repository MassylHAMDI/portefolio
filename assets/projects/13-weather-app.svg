<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="ga" cx="18%" cy="18%" r="85%">
      <stop offset="0" stop-color="#355b80" stop-opacity=".55"/>
      <stop offset="1" stop-color="#355b80" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb" cx="82%" cy="88%" r="80%">
      <stop offset="0" stop-color="#1c1d33" stop-opacity=".9"/>
      <stop offset="1" stop-color="#1c1d33" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="#0a0b15"/>
  <rect width="800" height="500" fill="url(#gb)"/>
  <rect width="800" height="500" fill="url(#ga)"/>

  <!-- téléphone -->
  <rect x="96" y="34" width="228" height="432" rx="30" fill="#0e1020" stroke="#ece7dd" stroke-opacity=".2" stroke-width="2"/>
  <rect x="176" y="48" width="68" height="9" rx="4.5" fill="#ece7dd" fill-opacity=".14"/>

  <!-- carte météo principale (verre dépoli) -->
  <rect x="114" y="78" width="192" height="168" rx="18" fill="#8fb8e8" fill-opacity=".1" stroke="#8fb8e8" stroke-opacity=".35"/>
  <text x="210" y="110" font-size="14" fill="#ece7dd" text-anchor="middle">Paris</text>
  <!-- soleil + nuage -->
  <circle cx="176" cy="146" r="17" fill="#e8b84b"/>
  <g fill="#ece7dd">
    <circle cx="196" cy="156" r="13"/>
    <circle cx="214" cy="152" r="16"/>
    <circle cx="230" cy="158" r="11"/>
    <rect x="196" y="152" width="45" height="17" rx="8.5"/>
  </g>
  <text x="210" y="212" font-size="34" font-weight="700" fill="#ece7dd" text-anchor="middle">21°</text>
  <text x="210" y="234" font-size="11" fill="#ece7dd" opacity=".6" text-anchor="middle">Éclaircies · ressenti 19°</text>

  <!-- prévisions -->
  <g>
    <rect x="114" y="262" width="58" height="82" rx="12" fill="#ece7dd" fill-opacity=".05" stroke="#ece7dd" stroke-opacity=".12"/>
    <text x="143" y="284" font-size="10" fill="#ece7dd" opacity=".6" text-anchor="middle">Sam.</text>
    <circle cx="143" cy="304" r="9" fill="#e8b84b"/>
    <text x="143" y="334" font-size="12" font-weight="600" fill="#ece7dd" text-anchor="middle">24°</text>
  </g>
  <g>
    <rect x="181" y="262" width="58" height="82" rx="12" fill="#ece7dd" fill-opacity=".05" stroke="#ece7dd" stroke-opacity=".12"/>
    <text x="210" y="284" font-size="10" fill="#ece7dd" opacity=".6" text-anchor="middle">Dim.</text>
    <g fill="#ece7dd" opacity=".85">
      <circle cx="204" cy="302" r="6"/><circle cx="213" cy="299" r="8"/><rect x="204" y="301" width="18" height="8" rx="4"/>
    </g>
    <text x="210" y="334" font-size="12" font-weight="600" fill="#ece7dd" text-anchor="middle">19°</text>
  </g>
  <g>
    <rect x="248" y="262" width="58" height="82" rx="12" fill="#ece7dd" fill-opacity=".05" stroke="#ece7dd" stroke-opacity=".12"/>
    <text x="277" y="284" font-size="10" fill="#ece7dd" opacity=".6" text-anchor="middle">Lun.</text>
    <g fill="#ece7dd" opacity=".85">
      <circle cx="271" cy="300" r="6"/><circle cx="280" cy="297" r="8"/><rect x="271" y="299" width="18" height="8" rx="4"/>
    </g>
    <g stroke="#8fb8e8" stroke-width="2" stroke-linecap="round">
      <line x1="271" y1="312" x2="268" y2="320"/><line x1="280" y1="312" x2="277" y2="320"/><line x1="289" y1="312" x2="286" y2="320"/>
    </g>
    <text x="277" y="334" font-size="12" font-weight="600" fill="#ece7dd" text-anchor="middle">16°</text>
  </g>

  <!-- barre de recherche -->
  <rect x="114" y="362" width="192" height="34" rx="17" fill="#ece7dd" fill-opacity=".06" stroke="#ece7dd" stroke-opacity=".14"/>
  <circle cx="134" cy="379" r="6" fill="none" stroke="#ece7dd" stroke-opacity=".5" stroke-width="2"/>
  <line x1="139" y1="384" x2="144" y2="389" stroke="#ece7dd" stroke-opacity=".5" stroke-width="2" stroke-linecap="round"/>
  <text x="154" y="384" font-size="11" fill="#ece7dd" opacity=".45">Rechercher une ville…</text>
  <rect x="114" y="410" width="192" height="34" rx="17" fill="#8fb8e8" fill-opacity=".14" stroke="#8fb8e8" stroke-opacity=".5"/>
  <text x="210" y="431" font-size="11" letter-spacing="1" fill="#bcd6f2" text-anchor="middle">Villes enregistrées (Room)</text>

  <!-- panneau architecture -->
  <g>
    <rect x="404" y="70" width="372" height="300" rx="14" fill="#ece7dd" fill-opacity=".045" stroke="#ece7dd" stroke-opacity=".12"/>
    <text x="424" y="104" font-size="11.5" letter-spacing="3" fill="#8fb8e8" opacity=".95">ARCHITECTURE MVVM</text>
    <g stroke="#ece7dd" stroke-opacity=".25">
      <rect x="424" y="124" width="332" height="40" rx="9" fill="#8fb8e8" fill-opacity=".14"/>
      <rect x="424" y="182" width="332" height="40" rx="9" fill="#8fb8e8" fill-opacity=".1"/>
      <rect x="424" y="240" width="160" height="40" rx="9" fill="#8fb8e8" fill-opacity=".07"/>
      <rect x="596" y="240" width="160" height="40" rx="9" fill="#8fb8e8" fill-opacity=".07"/>
    </g>
    <text x="590" y="149" font-size="12.5" fill="#ece7dd" opacity=".85" text-anchor="middle">UI — Jetpack Compose · Material 3</text>
    <text x="590" y="207" font-size="12.5" fill="#ece7dd" opacity=".85" text-anchor="middle">ViewModel — Coroutines &amp; Flow</text>
    <text x="504" y="265" font-size="12" fill="#ece7dd" opacity=".8" text-anchor="middle">Retrofit — API météo</text>
    <text x="676" y="265" font-size="12" fill="#ece7dd" opacity=".8" text-anchor="middle">Room — cache local</text>
    <line x1="590" y1="164" x2="590" y2="182" stroke="#ece7dd" stroke-opacity=".3"/>
    <line x1="504" y1="222" x2="504" y2="240" stroke="#ece7dd" stroke-opacity=".3"/>
    <line x1="676" y1="222" x2="676" y2="240" stroke="#ece7dd" stroke-opacity=".3"/>
    <text x="424" y="318" font-size="12.5" fill="#ece7dd" opacity=".7">Limitation de débit API · rafraîchissement suivi</text>
    <text x="424" y="342" font-size="11" fill="#ece7dd" opacity=".5">Données temps réel, consultables hors ligne.</text>
  </g>

  <!-- pastille techno -->
  <rect x="404" y="394" width="230" height="26" rx="13" fill="#8fb8e8" fill-opacity=".1" stroke="#8fb8e8" stroke-opacity=".45"/>
  <text x="519" y="411" font-size="11" letter-spacing="1" fill="#bcd6f2" text-anchor="middle">Kotlin · Jetpack Compose</text>
</svg>
